  SHIPPING_SERVICE_URL:     "http://shipping-service:8005"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8006"
  LOW_STOCK_THRESHOLD:      "10"
  RESERVATION_TTL_MINUTES:  "15"
