apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notification-pvc
  namespace: eci
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: eci
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8006
          env:
            - name: PORT
              value: "8006"
            - name: DATABASE_URL
              value: "sqlite:////db/notification.db"
          envFrom:
            - secretRef:
                name: eci-secrets

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 20
            periodSeconds: 30
          volumeMounts:
            - name: db-storage
              mountPath: /db
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: notification-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: eci
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8006
      targetPort: 8006
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service-external
  namespace: eci
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8006
      targetPort: 8006
      nodePort: 30006
  type: NodePort
